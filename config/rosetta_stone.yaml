# ── Source metadata ──────────────────────────────────
sources:
  iheartjane:
    label: iHeartJane
    adapter: iheartjane_v1
    category_mapping:
      Flower: Flower
      Preroll: Preroll
      Edible: "Edible Solid, Edible Liquid"
      Concentrate: "Concentrate, BHO"
      Vape: Cartridge
      Topical: Topical
      Gear: "(no direct match — likely NEW)"
      Merchandise: "(no direct match — likely NEW)"

    matching_hints:
      Flower: >
        No weight or product name available. Match on brand + strain only.
        If multiple catalog entries match (different weights), apply the
        description and image to ALL matching products (bulk-apply).
      Concentrate: >
        Match on brand + strain + weight. All three fields are available.
      Preroll: >
        Match on brand + strain + weight. This tab includes both regular
        and infused prerolls — check for "infused" in the product name
        to separate them into different product types.
      Edible: >
        Match the vendor's "Ratio & Product Name" column against the
        catalog name field, not strain_name.
      Vape: >
        The "Ratio & Product Name" column contains the strain name, not
        the product name. Match on brand + strain.
      Topical: >
        Very few products typically. Match on name if possible, otherwise
        flag for manual review.
      Gear: >
        No core products for paraphernalia in POSaBIT. These will almost
        always be INSERTs. Flag for manual review.
      Merchandise: >
        No core products for merchandise in POSaBIT. These will almost
        always be INSERTs. Flag for manual review.

  greenlabs:
    label: Green Labs
    adapter: greenlabs_v1
    category_mapping:
      Infused Preroll: Preroll
      Vape: Cartridge
      Edible: "Edible Solid"
      Drink: "Edible Liquid"
      Wellness: "Capsule"

    matching_hints:
      Infused Preroll: >
        Brand is embedded in the Product name (first word/phrase before the
        product details). Match on brand + strain. These are all infused
        pre-rolls — check pack size and weight to distinguish variants.
      Vape: >
        Brand is embedded in the Product name. Match on brand + strain.
        All items are disposable vape pens.
      Edible: >
        Brand is embedded in the Product name. Match on brand + product name.
        Strain may not be relevant — focus on brand + name. Check _source_category
        for subcategory (Gummies, Chocolates, Baked Goods).
      Drink: >
        Brand is embedded in the Product name. Match on brand + product name.
        These are non-carbonated cannabis drinks.
      Wellness: >
        Brand is embedded in the Product name. Match on brand + product name.
        These are therapeutic capsule products.

  greenlabs_inventory:
    label: Green Labs Inventory
    adapter: greenlabs_v2
    category_mapping: {}

    matching_hints:
      default: >
        This is vendor-by-venue inventory data, not product catalog data.
        Match vendor names against brand_name in the POSaBIT catalog to
        update quantity_on_hand. Fuzzy match vendor names — they may differ
        slightly from POSaBIT brand names.

  dutchie:
    label: Dutchie
    adapter: dutchie_v1
    category_mapping:
      Flower: Flower
      Preroll: Preroll
      Cartridge: Cartridge
      Concentrate: Concentrate
      "Edible Solid": "Edible Solid"
      "Edible Liquid": "Edible Liquid"
      Topical: Topical
      Accessories: "(no direct match — likely NEW)"

    # ── Product name cleanup ────────────────────────────
    # Dutchie Product Names contain format/weight/category suffixes that MUST
    # be stripped before matching against POSaBIT strain_name.
    # These rules are emitted into the reconciliation context file so an LLM
    # doing the reconciliation can apply them.
    name_cleanup_rules:
      - pattern: "(DOH Compliant)"
        action: "Remove anywhere in the name"
        example: "'Blue Dream - Flower (DOH Compliant)' → 'Blue Dream - Flower'"
      - pattern: "- Flower / - BB's / - Shake"
        action: "Remove Dutchie format suffixes after a dash"
        example: "'Blue Dream - Flower' → 'Blue Dream'; 'GG#4 - BB's' → 'GG#4'"
      - pattern: "Live Resin Vape Cartridge / Distillate Vape Cartridge"
        action: "Remove cartridge type suffix"
        example: "'Garlic Jam + CBN Live Resin Vape Cartridge' → 'Garlic Jam + CBN'"
      - pattern: "- Ng Concentrate / Live Resin Concentrate"
        action: "Remove concentrate suffix"
        example: "'GG#4 - 1g Concentrate' → 'GG#4'"
      - pattern: "- NxN.Ng Pre-Rolls / Party Pack / Kief Infused"
        action: "Remove preroll pack/weight suffix"
        example: "'Blue Dream - 2x0.5g Pre-Rolls' → 'Blue Dream'; 'White Truffle - 2x0.5g Kief Infused Pre-Rolls' → 'White Truffle'"
      - pattern: "Ng Flower (Passion Flower brand)"
        action: "Remove embedded weight+category from Passion Flower product names"
        example: "'Koffee Breath 7g Flower' → 'Koffee Breath'; 'Electric Watermelon 3.5g Flower' → 'Electric Watermelon'"
      - pattern: "Capsules / Suppository / Topical / Single"
        action: "Remove trailing product-type words"
        example: "'Sativa Lifestyle Capsules' → 'Sativa Lifestyle'; 'Rectify Suppository' → 'Rectify'"
      - pattern: "+ CBN / + CBG / + CBC / + CBD / + THCV"
        action: "Strip minor cannabinoid qualifiers for matching (match base strain)"
        example: "'Garlic Jam + CBN' matches POSaBIT strain 'Garlic Jam'; 'Dutch Treat + CBC' matches 'Dutch Treat'"
      - pattern: "w/"
        action: "Treat 'w/' as '+' for matching"
        example: "'Deep Sleep w/ CBN' matches 'Deep Sleep + CBN'"

    # ── Cross-category matching ──────────────────────────
    cross_category_matching:
      "Edible Liquid": ["Edible Solid"]
      "Edible Solid": ["Edible Liquid"]
      notes: >
        Passion Flower RTM (Ready-To-Mix) drink products may appear in
        Edible Solid in POSaBIT but Edible Liquid in Dutchie (or vice versa).
        Also, some Fairwinds capsules are categorized as Edible Liquid in
        POSaBIT. When matching edibles, search both categories.

    matching_hints:
      Flower: >
        Product Name often contains just the strain name (e.g., "MAC",
        "Blue Dream"). Match on brand + strain. Use _parsed_weight to
        disambiguate when multiple catalog entries match the same strain.
        IMPORTANT: Dutchie has multiple variants per strain — "Blue Dream",
        "Blue Dream - Flower", "Blue Dream - BB's", "Blue Dream - Shake",
        plus "(DOH Compliant)" versions. Strip the format suffix to get the
        base strain, then match each variant to a different POSaBIT entry.
        Passion Flower products embed weight in the name (e.g., "Koffee
        Breath 7g Flower") — strip the "Ng Flower" suffix to get the strain.
      Preroll: >
        Product Name contains pack and weight info (e.g., "Blue Dream -
        2x0.5g Pre-Rolls"). Strip the weight/pack suffix to extract the
        strain name. Use _parsed_weight and _parsed_pack_size to
        disambiguate. Check _source_subcategory for "infused" to separate
        infused prerolls from regular ones. Also watch for "Party Pack"
        and "Kief Infused" variants.
      Cartridge: >
        Mapped from Dutchie "Vaporizers". Product names end with "Live Resin
        Vape Cartridge" or "Distillate Vape Cartridge" — strip this to get
        the strain+qualifier (e.g., "Garlic Jam + CBN"). Then strip the
        minor cannabinoid qualifier ("+ CBN", "+ CBG", etc.) to get the
        base strain for matching against POSaBIT strain_name. The POSaBIT
        catalog often stores just the base strain (e.g., "Garlic Jam")
        while Dutchie includes the cannabinoid blend in the product name.
        Check _source_subcategory for "live-resin" vs regular cartridges.
      Concentrate: >
        Product names end with "- 1g Concentrate" or "Live Resin Concentrate"
        — strip to get strain. Also strip cannabinoid qualifiers ("+ CBG",
        etc.) for matching. Check _source_subcategory for concentrate type
        (live-resin, wax, sugar, rso, crumble).
      "Edible Solid": >
        Match on brand + product name against POSaBIT name field (not just
        strain_name). Strain may not be relevant — focus on brand + name.
        Strip "Capsules" / "Suppository" suffix before matching. POSaBIT
        uses abbreviated names like "FW Capsule Lifestyle Sativa 307" while
        Dutchie uses "Sativa Lifestyle Capsules" — match on key words.
        IMPORTANT: Also search Edible Liquid in POSaBIT, as some capsule
        products and RTM drinks may be categorized differently between systems.
      "Edible Liquid": >
        Includes Dutchie "Edible/drinks" and "Tincture" products. Match on
        brand + product name against POSaBIT name field. Strip "Single"
        suffix from drink names. POSaBIT names like "FW Tincture Spectrum
        3000 AM 036" differ significantly from Dutchie "Spectrum 3000 AM
        Tincture" — use keyword/substring matching, not exact match.
        IMPORTANT: Also search Edible Solid in POSaBIT, as Passion Flower
        RTM products (Ready-To-Mix drinks) may be categorized as Edible
        Solid in POSaBIT.
      Topical: >
        Very few products but naming varies greatly between systems.
        POSaBIT uses names like "Fairwinds Manufacturing Topical CBD Flow
        Gel 1.07oz" while Dutchie uses "FLOW CBD Gel Topical". Strip
        "Topical" suffix, then match on key words within the brand. Also
        match suppositories by stripping "Suppository" and matching the
        product name (e.g., "Rectify" matches "FW Suppository Rectify 701").
      Accessories: >
        No core products in POSaBIT. These will almost always be INSERTs.

  # cultivera:
  #   label: Cultivera
  #   adapter: generic_csv
  #   category_mapping:
  #     flower: Flower

# ── Field rosetta stone (keyed by POSaBIT field) ────
field_mappings:
  brand_name:
    iheartjane: Brand
    greenlabs: Product
    greenlabs_inventory: Vendor
    dutchie: Brand Name
    # cultivera: brand
    notes: "Also used for matching. For Green Labs, brand is embedded in Product name — LLM extracts it."

  strain_name:
    iheartjane: Strain
    greenlabs: STRAIN
    dutchie: Product Name
    # cultivera: strain_name
    notes: "Also used for matching. For Dutchie, Product Name often IS the strain — LLM extracts it."

  product_type_name:
    iheartjane: _product_category
    greenlabs: _product_category
    dutchie: _product_category
    # cultivera: category
    notes: Use the category mapping above

  name:
    iheartjane: Product Name
    greenlabs: Product
    dutchie: Product Name
    # cultivera: product_name
    notes: Use for name and display_name

  display_name:
    iheartjane: Product Name
    greenlabs: Product
    dutchie: Product Name
    # cultivera: display_name

  description:
    iheartjane: Product Description
    greenlabs: DESCRIPTION
    dutchie: Description
    # cultivera: description

  lineage:
    iheartjane: ~
    greenlabs: ~
    dutchie: _lineage
    notes: "Populate from vendor data if available. Dutchie Type column maps to lineage (Hybrid, Indica, Sativa, etc.)."

  pack_size:
    iheartjane: Pack Size
    greenlabs: "ITEMS PER PACK*"
    dutchie: _parsed_pack_size
    # cultivera: pack_size

  weight:
    iheartjane: "Amount [g]"
    greenlabs: "WEIGHT*"
    dutchie: _parsed_weight
    # cultivera: weight_grams
    notes: "Also check Total Weight: Amount x Pack Size. For Dutchie, weight is parsed from Product Name."

  image_url:
    iheartjane: "IMAGE LINK ONLY..."
    greenlabs: AVATAR_IMAGE
    dutchie: _image_url
    # cultivera: image_url
    notes: "**Always update** from vendor if value starts with http, even if POSaBIT already has an image. Dutchie has 9 Image columns — adapter picks the first non-nil URL."

  quantity_on_hand:
    greenlabs_inventory: "Products In Stock"
    notes: "Inventory count from vendor data — used to update stock levels"

  terpenes:
    iheartjane: ~
    greenlabs: ~
    dutchie: _terpenes
    notes: "Comma-separated terpene names. Dutchie has alternating Terpene/Terpene value columns — adapter collapses them."

  effects:
    iheartjane: ~
    greenlabs: ~
    dutchie: ~
    notes: "Comma-separated effect names"

  flavors:
    iheartjane: ~
    greenlabs: ~
    dutchie: ~
    notes: "Comma-separated flavor names"
