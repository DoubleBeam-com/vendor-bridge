# ── Source metadata ──────────────────────────────────
sources:
  iheartjane:
    label: iHeartJane
    adapter: iheartjane_v1
    category_mapping:
      Flower: Flower
      Preroll: Preroll
      Edible: "Edible Solid, Edible Liquid"
      Concentrate: "Concentrate, BHO"
      Vape: Cartridge
      Topical: Topical
      Gear: "(no direct match — likely NEW)"
      Merchandise: "(no direct match — likely NEW)"

    matching_hints:
      Flower: >
        No weight or product name available. Match on brand + strain only.
        If multiple catalog entries match (different weights), apply the
        description and image to ALL matching products (bulk-apply).
      Concentrate: >
        Match on brand + strain + weight. All three fields are available.
      Preroll: >
        Match on brand + strain + weight. This tab includes both regular
        and infused prerolls — check for "infused" in the product name
        to separate them into different product types.
      Edible: >
        Capsule are mapped to Edible Solid
        Tinctures are mapped to Edible Liquid
      Vape: >
        The "Ratio & Product Name" column contains the strain name, not
        the product name. Match on brand + strain.
      Topical: >
        Very few products typically. Match on name if possible, otherwise
        flag for manual review.
      Gear: >
        No core products for paraphernalia in POSaBIT. These will almost
        always be INSERTs. Flag for manual review.
      Merchandise: >
        No core products for merchandise in POSaBIT. These will almost
        always be INSERTs. Flag for manual review.

  greenlabs:
    label: Green Labs
    adapter: greenlabs_v1
    category_mapping:
      Infused Preroll: Preroll
      Vape: Cartridge
      Edible: "Edible Solid"
      Drink: "Edible Liquid"
      Wellness: "Capsule"

    matching_hints:
      Infused Preroll: >
        Brand is embedded in the Product name (first word/phrase before the
        product details). Match on brand + strain. These are all infused
        pre-rolls — check pack size and weight to distinguish variants.
      Vape: >
        Brand is embedded in the Product name. Match on brand + strain.
        All items are disposable vape pens.
      Edible: >
        Brand is embedded in the Product name. Match on brand + product name.
        Strain may not be relevant — focus on brand + name. Check _source_category
        for subcategory (Gummies, Chocolates, Baked Goods).
      Drink: >
        Brand is embedded in the Product name. Match on brand + product name.
        These are non-carbonated cannabis drinks.
      Wellness: >
        Brand is embedded in the Product name. Match on brand + product name.
        These are therapeutic capsule products.

  greenlabs_inventory:
    label: Green Labs Inventory
    adapter: greenlabs_v2
    category_mapping: {}

    matching_hints:
      default: >
        This is vendor-by-venue inventory data, not product catalog data.
        Match vendor names against brand_name in the POSaBIT catalog to
        update quantity_on_hand. Fuzzy match vendor names — they may differ
        slightly from POSaBIT brand names.

  dutchie:
    label: Dutchie
    adapter: dutchie_v1
    category_mapping:
      Flower: Flower
      Preroll: Preroll
      Cartridge: Cartridge
      Concentrate: Concentrate
      "Edible Solid": "Edible Solid"
      "Edible Liquid": "Edible Liquid"
      Topical: Topical
      Accessories: "(no direct match — likely NEW)"

    # ── Product name cleanup ────────────────────────────
    # Dutchie Product Names contain format/weight/category suffixes that MUST
    # be stripped before matching against POSaBIT strain_name.
    # These rules are emitted into the reconciliation context file so an LLM
    # doing the reconciliation can apply them.
    name_cleanup_rules:
      - pattern: "(DOH Compliant)"
        action: >
          Remove anywhere in the name. After removal, match the cleaned strain
          against POSaBIT rows — they may have "DOH" in their name prefix
          (e.g., "Pre-Rolls DOH - Blue Dream") or use standard format
          (e.g., "1/8 oz. Flower - Blue Dream - 3.5g").
        example: "'Blue Dream - Flower (DOH Compliant)' → strip to 'Blue Dream' → matches '1/8 oz. Flower - Blue Dream - 3.5g'"
      - pattern: "- Flower / - BB's / - Shake"
        action: "Remove Dutchie format suffixes after a dash"
        example: "'Blue Dream - Flower' → 'Blue Dream'; 'GG#4 - BB's' → 'GG#4'"
      - pattern: "Live Resin Vape Cartridge / Distillate Vape Cartridge"
        action: "Remove cartridge type suffix"
        example: "'Garlic Jam + CBN Live Resin Vape Cartridge' → 'Garlic Jam + CBN'"
      - pattern: "- Ng Concentrate / Live Resin Concentrate"
        action: "Remove concentrate suffix"
        example: "'GG#4 - 1g Concentrate' → 'GG#4'"
      - pattern: "- NxN.Ng Pre-Rolls / Party Pack / Kief Infused"
        action: "Remove preroll pack/weight suffix"
        example: "'Blue Dream - 2x0.5g Pre-Rolls' → 'Blue Dream'; 'White Truffle - 2x0.5g Kief Infused Pre-Rolls' → 'White Truffle'"
      - pattern: "Ng Flower (Passion Flower brand)"
        action: "Remove embedded weight+category from Passion Flower product names"
        example: "'Koffee Breath 7g Flower' → 'Koffee Breath'; 'Electric Watermelon 3.5g Flower' → 'Electric Watermelon'"
      - pattern: "Capsules / Suppository / Topical / Single"
        action: "Remove trailing product-type words"
        example: "'Sativa Lifestyle Capsules' → 'Sativa Lifestyle'; 'Rectify Suppository' → 'Rectify'"
      - pattern: "+ CBN / + CBG / + CBC / + CBD / + THCV"
        action: "Strip minor cannabinoid qualifiers for matching (match base strain)"
        example: "'Garlic Jam + CBN' matches POSaBIT strain 'Garlic Jam'; 'Dutch Treat + CBC' matches 'Dutch Treat'"
      - pattern: "w/"
        action: "Treat 'w/' as '+' for matching"
        example: "'Deep Sleep w/ CBN' matches 'Deep Sleep + CBN'"

    # ── Cross-category matching ──────────────────────────
    cross_category_matching:
      "Edible Liquid": ["Edible Solid"]
      "Edible Solid": ["Edible Liquid"]
      notes: >
        Passion Flower RTM (Ready-To-Mix) drink products may appear in
        Edible Solid in POSaBIT but Edible Liquid in Dutchie (or vice versa).
        Also, some Fairwinds capsules are categorized as Edible Liquid in
        POSaBIT. When matching edibles, search both categories.

    matching_hints:
      Flower: >
        Product Name often contains just the strain name (e.g., "MAC",
        "Blue Dream"). Match on brand + strain. Use _parsed_weight to
        disambiguate when multiple catalog entries match the same strain.
        IMPORTANT: Dutchie has multiple variants per strain — "Blue Dream",
        "Blue Dream - Flower", "Blue Dream - BB's", "Blue Dream - Shake",
        plus "(DOH Compliant)" versions. Strip the format suffix to get the
        base strain, then match each variant to a different POSaBIT entry.
        Passion Flower products embed weight in the name (e.g., "Koffee
        Breath 7g Flower") — strip the "Ng Flower" suffix to get the strain.
      Preroll: >
        Product Name contains pack and weight info (e.g., "Blue Dream -
        2x0.5g Pre-Rolls"). Strip the weight/pack suffix to extract the
        strain name. Use _parsed_weight and _parsed_pack_size to
        disambiguate. Check _source_subcategory for "infused" to separate
        infused prerolls from regular ones. Also watch for "Party Pack"
        and "Kief Infused" variants.
      Cartridge: >
        Mapped from Dutchie "Vaporizers". Product names end with "Live Resin
        Vape Cartridge" or "Distillate Vape Cartridge" — strip this to get
        the strain+qualifier (e.g., "Garlic Jam + CBN"). Then strip the
        minor cannabinoid qualifier ("+ CBN", "+ CBG", etc.) to get the
        base strain for matching against POSaBIT strain_name. The POSaBIT
        catalog often stores just the base strain (e.g., "Garlic Jam")
        while Dutchie includes the cannabinoid blend in the product name.
        Check _source_subcategory for "live-resin" vs regular cartridges.
      Concentrate: >
        Product names end with "- 1g Concentrate" or "Live Resin Concentrate"
        — strip to get strain. Also strip cannabinoid qualifiers ("+ CBG",
        etc.) for matching. Check _source_subcategory for concentrate type
        (live-resin, wax, sugar, rso, crumble).
      "Edible Solid": >
        Match on brand + product name against POSaBIT name field (not just
        strain_name). Strain may not be relevant — focus on brand + name.
        Strip "Capsules" / "Suppository" suffix before matching. POSaBIT
        uses abbreviated names like "FW Capsule Lifestyle Sativa 307" while
        Dutchie uses "Sativa Lifestyle Capsules" — match on key words.
        IMPORTANT: Also search Edible Liquid in POSaBIT, as some capsule
        products and RTM drinks may be categorized differently between systems.
        CAUTION: Capsules and tinctures must not be mixed. If a vendor
        product name contains "Capsule" or "Capsules", do NOT match it
        against POSaBIT tincture rows, and vice versa. Flag any cross-form
        matches for manual review.
      "Edible Liquid": >
        Includes Dutchie "Edible/drinks" and "Tincture" products. Match on
        brand + product name against POSaBIT name field. Strip "Single"
        suffix from drink names. POSaBIT names like "FW Tincture Spectrum
        3000 AM 036" differ significantly from Dutchie "Spectrum 3000 AM
        Tincture" — use keyword/substring matching, not exact match.
        IMPORTANT: Also search Edible Solid in POSaBIT, as Passion Flower
        RTM products (Ready-To-Mix drinks) may be categorized as Edible
        Solid in POSaBIT.
        CAUTION: Do NOT match tincture products against capsule rows. If a
        vendor product name contains "Tincture", it must only match POSaBIT
        tincture rows — never capsule rows. Flag any cross-form matches for
        manual review.
      Topical: >
        Very few products but naming varies greatly between systems.
        POSaBIT uses names like "Fairwinds Manufacturing Topical CBD Flow
        Gel 1.07oz" while Dutchie uses "FLOW CBD Gel Topical". Strip
        "Topical" suffix, then match on key words within the brand. Also
        match suppositories by stripping "Suppository" and matching the
        product name (e.g., "Rectify" matches "FW Suppository Rectify 701").
      Accessories: >
        No core products in POSaBIT. These will almost always be INSERTs.

    # ── Disambiguating vendor fields ──────────────────────
    # These underscore-prefixed fields in the flattened CSV carry critical
    # info for variant matching. The context builder emits them so the AI
    # knows how to interpret them.
    disambiguating_fields:
      _source_subcategory:
        description: >
          Dutchie subcategory slug parsed from the source data. Key values:
        values:
          "small-buds": >
            BB's product line. POSaBIT names these "Flower BB's - {strain} - {weight}"
            or "Packaged Flower BB's DOH - {strain} - {weight}".
            When _source_subcategory = "small-buds", search POSaBIT for names
            containing "BB's" and the strain. Do NOT insert as new.
          "shake": >
            Shake products. POSaBIT names these "Shake - {strain} - {weight}".
          "infused": >
            Infused prerolls. Search POSaBIT for "Infused Pre-Rolls - {strain}".
          "packs": >
            Multi-pack prerolls. Use _parsed_pack_size to match the specific
            pack variant in POSaBIT.
          "live-resin": >
            Live resin concentrates or cartridges. Check POSaBIT
            concentrate_type or name for "Live Resin".
      _parsed_pack_size:
        description: >
          Integer pack count parsed from product name (e.g., "56x0.5g" → 56).
          POSaBIT encodes pack size in the product name. Use to match preroll
          multi-packs:
        values:
          "2": "matches POSaBIT '.5g 2 pack' or '(0.5gx2)' rows"
          "10": "matches POSaBIT '.5g 10 pack' or '(0.5gx10)' rows"
          "20": "matches POSaBIT '.5g 20 pack' or '(0.5gx20)' rows"
          "56": "matches POSaBIT 'Party Pack (0.5gx56)' rows"
      _parsed_weight:
        description: >
          Numeric weight in grams parsed from product name (e.g., "3.5g" → 3.5).
          POSaBIT appends weight to names (e.g., "- 3.5g"). Use to pick the
          right variant when brand + strain match multiple entries.

    # ── Matching examples ─────────────────────────────────
    # Concrete before/after examples showing how tricky vendor names map to
    # POSaBIT products. These are emitted into the context file.
    matching_examples:
      - vendor_name: "Blue Dream - BB's"
        vendor_fields: "_source_subcategory: small-buds"
        posabit_name: "Flower BB's - Blue Dream - 3.5g"
        action: UPDATE
        reasoning: >
          "BB's" suffix + subcategory "small-buds" = BB's product line.
          POSaBIT prefixes with "Flower BB's" and appends weight. Strip
          "- BB's" to get strain "Blue Dream", search for "BB's" + "Blue Dream".
      - vendor_name: "Blue Dream - Flower (DOH Compliant)"
        vendor_fields: "_product_category: Flower"
        posabit_name: "1/8 oz. Flower - Blue Dream - 3.5g"
        action: UPDATE
        reasoning: >
          Strip "(DOH Compliant)" and "- Flower" suffix. Base strain = "Blue Dream".
          Search POSaBIT Flower category for "Blue Dream". Matches standard
          naming "1/8 oz. Flower - Blue Dream - 3.5g".
      - vendor_name: "Blue Dream - Party Pack 56x0.5g Pre-Rolls"
        vendor_fields: "_parsed_pack_size: 56, _parsed_weight: 0.5, _source_subcategory: packs"
        posabit_name: "Pre-Rolls DOH - Blue Dream - Party Pack (0.5gx56)"
        action: UPDATE
        reasoning: >
          Strip pack/weight suffix to get "Blue Dream". Use _parsed_pack_size=56
          to find POSaBIT row with "(0.5gx56)" or "Party Pack" in name.
      - vendor_name: "White Truffle - 2x0.5g Kief Infused Pre-Rolls"
        vendor_fields: "_source_subcategory: infused, _parsed_pack_size: 2, _parsed_weight: 0.5"
        posabit_name: "Infused Pre-Rolls - White Truffle - (0.5gx2)"
        action: UPDATE
        reasoning: >
          Subcategory "infused" + "Kief Infused" in name → search POSaBIT for
          "Infused Pre-Rolls" + strain "White Truffle" + pack size matching "(0.5gx2)".
      - vendor_name: "Koffee Breath 7g Flower"
        vendor_fields: "_product_category: Flower, _parsed_weight: 7"
        posabit_name: "Koffee Breath - Flower 7g [Passion Flower]"
        action: UPDATE
        reasoning: >
          Passion Flower brand embeds weight in name. Strip "7g Flower" suffix
          to get strain "Koffee Breath". Use weight=7 to match the 7g variant.

  cultivera:
    label: Cultivera
    adapter: cultivera_v1
    category_mapping:
      Preroll: Preroll
      Flower: Flower

    matching_hints:
      default: >
        The primary goal is to match Cultivera products to POSaBIT
        core products and populate sku_reference from the _sku field.
        Match on _parsed_strain + _parsed_weight + _parsed_pack_size.
        Product-Line (in _source_subcategory) tells you the product type.
        Cultivera data has no images or descriptions — only update
        sku_reference on matched rows.

  cnduit:
    label: CNDUIT
    adapter: cnduit_v1
    category_mapping:
      Flower: Flower
      Preroll: Preroll
      "Infused Preroll": "Infused Preroll"
      Vape: Cartridge
      Concentrate: Concentrate

    matching_hints:
      Flower: >
        Match on brand + Product Name (strain). The Type column gives lineage
        (Hybrid/Indica/Sativa). Image URLs are Google Drive links.
      Preroll: >
        Section title encodes pack size (2pk, 5pk, 28pk). Use _parsed_pack_size
        to disambiguate variants. Same strains appear across multiple pack sizes.
      "Infused Preroll": >
        Includes Bubblehash Infused Joints and Terp Infused Prerolls.
        Section title encodes pack size. Match on brand + strain + pack size.
      Vape: >
        Section title distinguishes Disposable/All-in-one from 510 Cartridge.
        The _section_title field carries this form factor info.
      Concentrate: >
        Section title distinguishes BHO from Rosin. The _section_title field
        carries this info. Match on brand + strain.

    disambiguating_fields:
      _section_title:
        description: >
          Product line from the section header, after the brand name.
          Encodes form factor and pack size.
        values:
          "Classic Prerolls - 2pk": "2-pack classic prerolls"
          "Classic Prerolls - 5pk": "5-pack classic prerolls"
          "Classic Prerolls - 28pk": "28-pack classic prerolls"
          "Flower Joints - 2pk": "2-pack full flower joints"
          "Flower Joints - 7pk": "7-pack full flower joints"
          "Bubblehash Infused Joints - 2pk": "2-pack bubble hash infused joints"
          "Bubblehash Infused Joints - 7pk": "7-pack bubble hash infused joints"
          "Live Resin Vape - 1g Disposable / All-in-one": "1g disposable vape"
          "Live Resin Vape - 1g 510 Threaded Cartridge": "1g 510 cart"
          "Distillate Vape - Disposable / All-In-One": "disposable distillate vape"
          "Distillate Vape - 510 Threaded Cartridge": "510 distillate cart"
          "Cured Resin Vape - Disposable / All-In-One": "disposable cured resin vape"
          "Cured Resin Vape - 510 Threaded Cartridge": "510 cured resin cart"
          "BHO Concentrate": "BHO extract"
          "Rosin Concentrates": "Solventless rosin"
      _parsed_pack_size:
        description: >
          Integer pack count parsed from section title (e.g., "2pk" → 2).
          Use to match the specific pack variant in POSaBIT.

# ── Field rosetta stone (keyed by POSaBIT field) ────
field_mappings:
  brand_name:
    iheartjane: Brand
    greenlabs: Product
    greenlabs_inventory: Vendor
    dutchie: Brand Name
    cultivera: _vendor_name
    cnduit: Brand Name
    notes: "Also used for matching. For Green Labs, brand is embedded in Product name — LLM extracts it. For Cultivera, extracted from the title row."

  strain_name:
    iheartjane: Strain
    greenlabs: STRAIN
    dutchie: Product Name
    cultivera: _parsed_strain
    cnduit: Product Name
    notes: "Also used for matching. For Dutchie, Product Name often IS the strain — LLM extracts it. For Cultivera, parsed from Product name."

  product_type_name:
    iheartjane: _product_category
    greenlabs: _product_category
    dutchie: _product_category
    cultivera: _product_category
    cnduit: _product_category
    notes: Use the category mapping above

  name:
    iheartjane: Product Name
    greenlabs: Product
    dutchie: Product Name
    cultivera: Product
    cnduit: Product Name
    notes: Use for name and display_name

  display_name:
    iheartjane: Product Name
    greenlabs: Product
    dutchie: Product Name
    cultivera: Product
    cnduit: Product Name

  description:
    iheartjane: Product Description
    greenlabs: DESCRIPTION
    dutchie: Description
    cultivera: ~
    cnduit: Description

  lineage:
    iheartjane: ~
    greenlabs: ~
    dutchie: _lineage
    cnduit: _lineage
    notes: "Populate from vendor data if available. Dutchie Type column maps to lineage (Hybrid, Indica, Sativa, etc.)."

  pack_size:
    iheartjane: Pack Size
    greenlabs: "ITEMS PER PACK*"
    dutchie: _parsed_pack_size
    default: "Items Per Pack"
    cultivera: _parsed_pack_size
    cnduit: _parsed_pack_size

  weight:
    iheartjane: "Amount [g]"
    greenlabs: "WEIGHT*"
    dutchie: _parsed_weight
    cultivera: _parsed_weight
    notes: "Also check Total Weight: Amount x Pack Size. For Dutchie and Cultivera, weight is parsed from Product Name."

  cover_image_url:
    iheartjane: "IMAGE LINK ONLY..."
    greenlabs: AVATAR_IMAGE
    dutchie: _cover_image_url
    cultivera: ~
    cnduit: _cover_image_url
    notes: "Primary/hero product image. **ALWAYS** update from vendor when value starts with http — even if POSaBIT already has an image, and even after a cross-category match where product_type_name was corrected. The vendor image corresponds to the vendor's product form, which is authoritative after correction. Dutchie has up to 9 Image columns — adapter picks the first non-nil URL as the cover image."

  image_urls:
    dutchie: _image_urls
    cultivera: ~
    notes: "Comma-separated additional image URLs (beyond the cover image). Dutchie adapter populates this from Image columns 2+. iHeartJane and Green Labs do not currently provide additional images."

  sku_reference:
    cultivera: _sku
    notes: "Cultivera product SKU — primary value for PO integration. Populate from _sku on matched rows."

  quantity_on_hand:
    greenlabs_inventory: "Products In Stock"
    notes: "Inventory count from vendor data — used to update stock levels"

  terpenes:
    iheartjane: ~
    greenlabs: ~
    dutchie: _terpenes
    notes: "Comma-separated terpene names. Dutchie has alternating Terpene/Terpene value columns — adapter collapses them."

  effects:
    iheartjane: ~
    greenlabs: ~
    dutchie: ~
    notes: "Comma-separated effect names"

  flavors:
    iheartjane: ~
    greenlabs: ~
    dutchie: ~
    notes: "Comma-separated flavor names"

  source_name:
    iheartjane: Product Name
    greenlabs: Product
    dutchie: Product Name
    cultivera: Product
    cnduit: Product Name
    notes: "Raw product name from the vendor source row — populates the source_name audit column for traceability"

# ── Warning rules (global) ───────────────────────────
# Emitted into every reconciliation context file.
# The AI must check each rule and populate the `warnings` column.
warning_rules:
  - id: capsule_tincture_mismatch
    trigger: "Updating cover_image_url on Edible Solid, Edible Liquid, or Capsule product"
    condition: >
      Vendor source category suggests a different product form than the
      POSaBIT row (e.g., vendor says "Tincture" but POSaBIT row is a
      capsule, or vendor product name contains "Capsule" but POSaBIT
      row is a tincture)
    warning_text: "capsule/tincture mismatch"
    action: >
      Correct product_type_name to match the vendor's _product_category
      (see product_type_correction_rules). Then apply the vendor image
      normally. Add 'product_type_name' to updated_fields.

  - id: lineage_precision_loss
    trigger: "Updating lineage on any product"
    condition: >
      The new value is less specific than the existing value
      (e.g., indica_hybrid -> indica, sativa_hybrid -> sativa)
    warning_text: "lineage precision loss"
    action: "Keep the original more specific lineage value."

  - id: cross_category_match
    trigger: "Matching a vendor row to a POSaBIT row in a different category"
    condition: >
      The vendor's _product_category (after category mapping) does not
      match the POSaBIT row's product_type_name
    warning_text: "cross-category match"
    action: "Verify this is a legitimate cross-category match, not a mismatch."

  - id: possible_strain_mismatch
    trigger: "Update row where strain matching is uncertain"
    condition: >
      The POSaBIT row's name or strain_name does not fuzzy-match the
      vendor strain after cleanup
    warning_text: "possible strain mismatch"
    action: "Do NOT update. Convert to INSERT or flag for manual review."

  - id: concentrate_type_inferred
    trigger: "Setting concentrate_type from product name or subcategory"
    condition: "Value was inferred from name or subcategory, not a dedicated field"
    warning_text: "concentrate_type inferred"
    action: "Verify the inferred concentrate type is correct."

# ── Product type correction (cross-category matches) ──
# When a cross-category match is made (e.g., Edible Solid vendor row
# matches an Edible Liquid POSaBIT row), the AI must correct the
# product_type_name to match the vendor's _product_category.
product_type_correction_rules:
  trigger: >
    A vendor row's _product_category (after adapter mapping) does not
    match the POSaBIT row's product_type_name, and the match was found
    via cross-category search.
  action: >
    Correct product_type_name on the output row to match the vendor's
    _product_category. Add 'product_type_name' to updated_fields.
    Then apply all other vendor fields (including cover_image_url)
    normally.
  keyword_overrides:
    - keywords: ["Capsule", "Capsules"]
      correct_to: "Edible Solid"
    - keywords: ["Tincture"]
      correct_to: "Edible Liquid"
    - keywords: ["Drink", "Beverage", "RTM"]
      correct_to: "Edible Liquid"
  notes: >
    The vendor adapter (e.g., Dutchie) already maps categories correctly
    in _product_category. When a cross-category match occurs, the vendor's
    _product_category is authoritative. Product name keywords serve as a
    secondary confirmation. After correcting product_type_name, the image
    guard no longer blocks — apply the vendor image.

# ── Concentrate type inference ────────────────────────
# concentrate_type is not directly mapped from vendor data. Instead,
# it must be inferred from other fields in the source row.
concentrate_type_rules:
  canonical_values:
    - Live Resin
    - BHO
    - Wax
    - Sugar Wax
    - RSO
    - Crumble
    - Rosin
    - Shatter
    - Distillate
    - Cured Resin
    - Bubble Hash
    - Diamonds
    - Badder
    - Sauce

  apply_to_categories:
    - Concentrate
    - BHO
    - Cartridge

  never_apply_to:
    - Flower
    - Preroll
    - "Edible Solid"
    - "Edible Liquid"
    - Topical
    - Accessories

  inference_by_source:
    dutchie:
      - field: _source_subcategory
        mapping:
          "live-resin": "Live Resin"
          "wax": "Wax"
          "sugar": "Sugar Wax"
          "rso": "RSO"
          "crumble": "Crumble"
          "rosin": "Rosin"
          "shatter": "Shatter"
          "distillate": "Distillate"
          "badder": "Badder"
          "sauce": "Sauce"
          "diamonds": "Diamonds"
          "cured-resin": "Cured Resin"
      - field: Product Name
        method: keyword_scan
        notes: >
          Scan the product name for any canonical concentrate type keyword.
          E.g., "Blue Dream Live Resin Concentrate" -> "Live Resin".

    cnduit:
      - field: _section_title
        mapping:
          "BHO Concentrate": "BHO"
          "Rosin Concentrates": "Rosin"
      - field: Product Name
        method: keyword_scan
        notes: >
          Scan the product name for concentrate type keywords if
          _section_title does not provide a match.

    iheartjane:
      - field: Product Name
        method: keyword_scan
        notes: >
          iHeartJane does not provide a concentrate subtype field.
          Scan the product name for concentrate type keywords.

    greenlabs:
      - field: Product
        method: keyword_scan
        notes: >
          Green Labs does not provide a concentrate subtype field.
          Scan the product name for concentrate type keywords.

  notes: >
    Only populate concentrate_type for products in Concentrate, BHO, or
    Cartridge categories. If the product's final (corrected) product_type_name
    is NOT in apply_to_categories, concentrate_type MUST be blank — even if
    the matched POSaBIT row had a value or the product name contains concentrate
    keywords. When a POSaBIT row has a concentrate_type but the product is not
    in a concentrate/cartridge category, clear it to blank in the output.
    For Cartridge products, the concentrate_type indicates what type of oil
    is in the cartridge (e.g., Live Resin, Distillate). For updates, only set
    concentrate_type if the POSaBIT row's concentrate_type is currently blank.
    Never overwrite an existing concentrate_type value. If uncertain, leave blank.
